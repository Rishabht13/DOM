<!doctype html>
<html>
  <head>
    <title>Shipping calculator</title>
    <link rel="stylesheet" href="shipping cal.css" />
  </head>
  <body>
    <div class="container">
      <div class="info">

        
        <h2>Shipping Calculator.</h2>
        <p>Anything under 200 have 40 shipping charges.</p>
        <p>Above 200 have no shipping charges.</p>
        <p>Above 500 have 10% discount.</p>
      </div>
        <input
      placeholder="Cost of Order"
      onkeydown="enter(event)"
      oninput="reset()"
      />
      <button onclick="calculate()">Calculate</button>
      <p class="total"></p>
      <script src="shipping cal.js"></script>
    </div>
  </body>
</html>
